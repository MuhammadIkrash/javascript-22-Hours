<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cart_function</title>
  </head>
  <body>
    <button onclick="console.log(`Cart Quantity : ${cart}`)">
      cart Quantity
    </button>
    <button
      onclick="
        cart += 1;
        console.log(`Cart Quantity : ${cart}`);
      "
    >
      Add to cart
    </button>
    <button
      onclick="
        cart += 2;
        console.log(`Cart Quantity : ${cart}`);
      "
    >
      + 2
    </button>
    <button
      onclick="
        cart += 3;
        console.log(`Cart Quantity : ${cart}`);
      "
    >
      + 3
    </button>
    <button
      onclick="
        cart = 0;
        console.log('cart was reset');

        console.log(`Cart Quantity : ${cart}`);
      "
    >
      reset cart
    </button>
  </body>
  <script>
    let cart = 0;
  </script>
</html>
