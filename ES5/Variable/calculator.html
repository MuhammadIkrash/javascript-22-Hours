<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>

  <body>
    <body>
    <button onclick="console.log(calculation += '1');
    ">1</button>
    <button onclick="console.log(calculation += '2');">2</button>
    <button onclick="console.log(calculation += '3');">3</button>
    <button onclick="console.log(calculation += '+');">+</button>
    <button onclick="calculation = eval(calculation); console.log(calculation);
    ">=</button>
  </body>
  <script>
      let calculation = '';
    </script>
